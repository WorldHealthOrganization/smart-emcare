<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenAPI Documentation - SMART Base</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css"
          href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">
    <style>
      body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
      /* WHO-styled header bar */
      .who-header {
        background-color: #00477d;
        color: #ffffff;
        padding: 0.6rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .who-header a.home-link {
        color: #ffffff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.6);
        padding: 0.25rem 0.75rem;
        border-radius: 3px;
        transition: background-color 0.2s ease;
      }
      .who-header a.home-link:hover {
        background-color: rgba(255,255,255,0.15);
        text-decoration: none;
      }
      .who-header .header-title {
        flex: 1;
      }
      /* Definition selector bar below the header */
      #definition-selector-bar {
        background-color: #0070a1;
        color: #ffffff;
        padding: 0.5rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.9rem;
        flex-wrap: wrap;
      }
      #definition-selector-bar label {
        font-weight: 600;
        white-space: nowrap;
      }
      #definition-select {
        font-size: 0.9rem;
        padding: 0.25rem 0.5rem;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.6);
        background-color: #ffffff;
        color: #00477d;
        min-width: 200px;
        max-width: 100%;
        flex: 1;
      }
      /* Hide Swagger UI topbar entirely */
      .swagger-ui .topbar {
        display: none;
      }
      .existing-api-content { padding: 1rem 2rem; }
    </style>
  </head>

<div id="smart-ci-build-banner" style="background:#fff3cd;color:#664d03;border-bottom:1px solid #ffda6a;padding:.5rem 1rem;font-size:.9rem;"><p style="margin:0;">CI build for version <strong>0.1.0</strong>. <br/><span  style="font-size:.85em;">Built from commit <a href="https://github.com/WorldHealthOrganization/smart-emcare/commit/1051de42cf8f24507f49f52bd49c120a67f7e992"><code>1051de42</code></a>. &nbsp; Branch: <a href="https://github.com/WorldHealthOrganization/smart-emcare/tree/feature/update-canonical"><code>feature/update-canonical</code></a>.</span></p></div>
